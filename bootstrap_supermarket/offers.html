<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shop page</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        margin: 0;
      }

      main {
        flex: 1 0 auto; /* Fill remaining space */
        margin-top: 70px; /* Space for fixed-top navbar */
      }

      .masthead {
        height: 100vh; /* Full viewport height */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        align-items: center; /* vertical center */
        text-align: center;
        position: relative;
        flex-wrap: nowrap;
      }

      .masthead::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(11, 0, 0, 0.4); /* Optional dark overlay */
        z-index: 1;
      }

      .masthead .container {
        position: relative;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <!-- Navigation-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success fixed-top">
      <div class="container">
        <!-- Brand -->
        <a class="navbar-brand d-flex align-items-center" href="/index.html">
          <img
            src="/public/3731110.png"
            alt="Logo"
            width="40"
            height="40"
            class="me-2 rounded-circle"
          />
          Fresh Shop
        </a>

        <!-- Toggler -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarResponsive"
          aria-controls="navbarResponsive"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          Menu
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links -->
        <div class="collapse navbar-collapse" id="navbarResponsive">
          <ul class="navbar-nav text-uppercase ms-auto py-4 py-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="/index.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/shop.html">Shop</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/gallery.html">Gallery</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/offers.html">Offers</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container my-5">
      <!-- Section Title -->
      <div class="col-lg-12 text-center mt-5 justify-content-center">
        <h1 class="text-success fw-bold">Special Offers</h1>
        <p class="lead">Check out our latest offers on fresh produce!</p>
      </div>

      <!-- Offers Grid -->
      <div class="row g-4 mt-5">
        <!-- Offer 1 -->
        <div class="col-md-4">
          <div class="card h-100 text-center shadow-sm">
            <div class="card-body d-flex flex-column justify-content-center">
              <h2 class="card-title text-success fw-bold">Buy 1 Get 1 Free</h2>
              <p class="card-text">On all fruits</p>
              <a href="/shop.html" class="btn btn-success mt-auto">Shop Now</a>
            </div>
          </div>
        </div>

        <!-- Offer 2 -->
        <div class="col-md-4">
          <div class="card h-100 text-center shadow-sm">
            <div class="card-body d-flex flex-column justify-content-center">
              <h2 class="card-title text-success fw-bold">20% Off</h2>
              <p class="card-text">On all vegetables</p>
              <a href="/shop.html" class="btn btn-success mt-auto">Shop Now</a>
            </div>
          </div>
        </div>

        <!-- Offer 3 -->
        <div class="col-md-4">
          <div class="card h-100 text-center shadow-sm">
            <div class="card-body d-flex flex-column justify-content-center">
              <h2 class="card-title text-success fw-bold">Free Delivery</h2>
              <p class="card-text">On orders over $50</p>
              <a href="/shop.html" class="btn btn-success mt-auto">Shop Now</a>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!-- Footer-->
    <footer class="footer py-4 bg-success text-white mt-auto">
      <div class="container text-center">Copyright &copy; Fresh Shops 2026</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
