<div class="container-fluid mt-4 pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-dark mb-0">Customer Directory</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="#!/dashboard"
                            class="text-success text-decoration-none">Dashboard</a></li>
                    <li class="breadcrumb-item active">Customers</li>
                </ol>
            </nav>
        </div>
        <a href="#!/dashboard" class="btn btn-outline-secondary btn-sm shadow-sm rounded-pill px-3">
            <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
        </a>
    </div>

    <div class="card border-0 shadow-sm p-4 mb-4">
        <h5 class="text-success fw-bold mb-4">
            <i class="bi bi-plus-circle-fill me-2"></i> Register New Customer
        </h5>
        <form ng-submit="addCustomer()" class="row g-3">
            <div class="col-md-3">
                <label class="form-label small fw-bold text-muted">FULL NAME</label>
                <input type="text" class="form-control border-light-subtle bg-light-subtle" placeholder="e.g. John Doe"
                    ng-model="newCustomer.name" required>
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold text-muted">PHONE NUMBER</label>
                <input type="text" class="form-control border-light-subtle bg-light-subtle" placeholder="01xxxxxxxxx"
                    ng-model="newCustomer.phone" required>
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold text-muted">ADDRESS</label>
                <input type="text" class="form-control border-light-subtle bg-light-subtle" placeholder="City, Street"
                    ng-model="newCustomer.address">
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold text-muted">MEDICAL ILLNESS</label>
                <input type="text" class="form-control border-light-subtle bg-light-subtle"
                    placeholder="None / Diabetic" ng-model="newCustomer.medical_illness">
            </div>
            <div class="col-12 text-end mt-4">
                <button type="submit" class="btn btn-success px-4 fw-bold rounded-3">
                    <i class="bi bi-person-plus-fill me-2"></i> Register Customer
                </button>
            </div>
        </form>
    </div>
    <div class="alert alert-success" ng-if="message">
        {{message}}
    </div>
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold text-dark">Customer List</h5>
            <div class="input-group input-group-sm w-25">
                <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control bg-light border-0" placeholder="Search customer..."
                    ng-model="searchQuery">
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light-subtle">
                        <tr>
                            <th class="ps-4 py-3 text-secondary small fw-bold">NAME</th>
                            <th class="py-3 text-secondary small fw-bold">PHONE</th>
                            <th class="py-3 text-secondary small fw-bold">ADDRESS</th>
                            <th class="py-3 text-secondary small fw-bold">MEDICAL ILLNESS</th>
                            <th class="py-3 text-secondary small fw-bold">STATUS</th>
                            <th class="py-3 text-secondary small fw-bold text-center">ACTION</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr ng-repeat="c in CustomersList | filter:searchQuery">
                            <td class="ps-4 fw-bold">{{c.name}}</td>
                            <td>{{c.phone}}</td>
                            <td>{{c.address}}</td>
                            <td>
                                <span class="badge bg-info-subtle text-info px-3 rounded-pill"
                                    ng-if="c.medical_illness">
                                    {{c.medical_illness}}
                                </span>
                                <span class="text-muted small" ng-if="!c.medical_illness">None</span>
                            </td>
                            <td><span class="badge bg-success-subtle text-success px-2 py-1">Active</span></td>
                            <td class="text-center">
                                <button class="btn btn-link text-primary p-1" ng-click="EditCustomer(c)"
                                    data-bs-toggle="modal" data-bs-target="#editModal">
                                    <i class="bi bi-pencil-square fs-5"></i>
                                </button>
                                <button class="btn btn-link text-danger p-1" ng-click="deleteCustomer(c.id)" ng-if="adminRole === 'manager'">
                                    <i class="bi bi-trash3-fill fs-5"></i>
                                </button>
                                <a href="#!/AddInvoicView/{{c.id}}">
                                    <button class="btn btn-link text-success p-1">
                                        <i class="fa-solid fa-square-plus"></i>
                                    </button>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-success"><i class="bi bi-pencil-fill me-2"></i>Update Customer
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Full Name</label>
                        <input type="text" class="form-control bg-light" ng-model="ChosenCustomer.name">
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Phone</label>
                            <input type="text" class="form-control bg-light" ng-model="ChosenCustomer.phone">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Status</label>
                            <select class="form-select bg-light">
                                <option>Active User</option>
                                <option>Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Medical Conditions</label>
                        <textarea class="form-control bg-light" rows="3"
                            ng-model="ChosenCustomer.medical_illness"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light px-4 rounded-pill"
                        data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success px-4 rounded-pill fw-bold"
                        ng-click="SaveEditCustomer()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>
</div>
