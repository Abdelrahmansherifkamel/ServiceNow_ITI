<div class="login-page">
    <div class="container h-100">
        <div class="row h-100 justify-content-center align-items-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="text-success fw-bold mb-0">
                                <i class="bi bi-leaf-fill"></i> Pharmacare
                            </h2>
                            <p class="text-muted small">Sign in to your account</p>
                        </div>

                        <form ng-submit="login()">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Your Email</label>
                                <input type="email" class="form-control form-control-lg" 
                                       placeholder="Email@example.com" ng-model="user.email" required>
                            </div>

                            <div class="mb-3">
                                <div class="d-flex justify-content-between">
                                    <label class="form-label small fw-bold">Password</label>
                                    <a href="#" class="small text-decoration-none text-success">Forgot password?</a>
                                </div>
                                <input type="password" class="form-control form-control-lg" 
                                       placeholder="Password" ng-model="user.password" required>
                            </div>

                            <button type="submit" class="btn btn-success w-100 py-2 mt-3 fw-bold" ng-disabled="loading">
                                <span ng-show="!loading">Sign in</span>
                                <span ng-show="loading">Authenticating...</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
