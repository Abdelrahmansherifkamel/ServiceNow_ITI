  // Array to store all books

  // Book object structure: { title, author, availableCopies, borrowedCopies }task6 library management system

  let books = [];
  function addBook() {
    let title = prompt("Enter book title:");
    if (!title) return;

    if (books.some((b) => b.title === title)) {
      alert("Book already exists!");
      let existingBook = books.find((b) => b.title === title);
      existingBook.availableCopies++;
      return;
    }

    let author = prompt("Enter author name:");
    if (!author) return;

    let availableCopies = Number(prompt("Enter available copies:"));
    if (isNaN(availableCopies) || availableCopies < 0) {
      alert("Invalid number of copies!");
      return;
    }

    let book = {
      title: title,
      author: author,
      availableCopies: availableCopies,
      borrowedCopies: 0,
      borrowCount: 0,
    };

    books.push(book);
    alert(`Book "${title}" added successfully!`);
  }

  function borrowBook() {
    let title = prompt("Enter book title to borrow:");
    let book = books.find((b) => b.title === title);

    if (!book) {
      alert("Book not found!");
      return;
    }

    if (book.availableCopies > 0) {
      book.availableCopies--;
      book.borrowedCopies++;
      book.borrowCount++;
      alert(`You borrowed "${title}".`);
    } else {
      alert(`Sorry, "${title}" is currently unavailable.`);
    }
  }

  function returnBook() {
    let title = prompt("Enter book title to return:");
    let book = books.find((b) => b.title === title);

    if (!book) {
      alert("Book not found!");
      return;
    }

    if (book.borrowedCopies > 0) {
      book.availableCopies++;
      book.borrowedCopies--;
      alert(`You returned "${title}".`);
    } else {
      alert(`You haven't borrowed "${title}".`);
    }
  }

  function calculateTotalBooks() {
    return books.reduce(
      (total, b) => total + b.availableCopies + b.borrowedCopies,
      0,
    );
  }

  function showLibraryReport() {
    if (books.length === 0) {
      alert("No books in the library.");
      return;
    }

    let report = "Library Report:\n";

    books.forEach((b, i) => {
      report += `${i + 1}. "${b.title}" by ${b.author} - Available: ${b.availableCopies}, Borrowed: ${b.borrowedCopies}\n`;
    });

    alert(report);
  }

  while (true) {
    let choice = prompt(
      "Library Menu:\n" +
        "1 → Add New Book\n" +
        "2 → Borrow Book\n" +
        "3 → Return Book\n" +
        "4 → Show Library Report\n" +
        "5 → Exit",
    );

    if (choice === null) {
      alert("Exiting...");
      break;
    }

    switch (choice) {
      case "1":
        addBook();
        break;
      case "2":
        borrowBook();
        break;
      case "3":
        returnBook();
        break;
      case "4":
        showLibraryReport();
        break;
      case "5":
        alert("Exiting...");
        break;
      default:
        alert("Invalid choice! Please try again.");
    }

    if (choice === "5") break;
  }
