<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Page</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>

    <!-- NAVBAR -->
    <header>
      <div class="logo">
        <img src="public/3731110.png" alt="shopping icon" />
        <h2>Fresh Shop</h2>
      </div>
      <nav>
        <a href="/index.html">Home</a>
        <a href="/cart.html"> Cart</a>
        <a href="/shop.html">shop</a>
        <a href="/gallery.html">Gallery</a>
        <a href="/contact.html">contact Us</a>
        <a href="/offers.html">offers</a>
      </nav>
    </header>

    <main>

      <!-- HERO SECTION -->
      <section class="hero">
        <h2>Freshness to your home</h2>
        <p>Stay in your home and the shop comes to you</p>
        <button><a href="/shop.html">shop now</a></button>
      </section>

      <!-- CATEGORY TITLE -->
      <h1 class="title">Shop by Category</h1>

      <!-- CARDS CONTAINER -->
      <div class="cards">

        <!-- CARD 1 -->
        <div class="card">
          <i class="fa-solid fa-apple-whole card-icon"></i>
          <h2>Fresh Products</h2>
          <p>Oranges, vegetables</p>
          <button>View More</button>
        </div>

        <!-- CARD 2 -->
        <div class="card">
          <i class="fa-solid fa-bread-slice card-icon"></i>
          <h2>Bakery</h2>
          <p>Baked fresh daily</p>
          <button>View More</button>
        </div>

        <!-- CARD 3 -->
        <div class="card">
          <i class="fa-solid fa-cheese card-icon"></i>
          <h2>Dairy Products</h2>
          <p>Milk, cheese, butter</p>
          <button>View More</button>
        </div>

      </div>

    </main>

    <!-- FOOTER -->
    <footer>
    <p>© 2026 Abdulrahman Abdelmonim. All rights reserved.</p>
    </footer>

  </body>
</html>
