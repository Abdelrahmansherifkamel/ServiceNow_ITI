<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Users Table</title>

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .error {
        color: red;
        font-size: 0.9em;
      }
      input.ng-invalid.ng-touched {
        border-color: red;
      }
    </style>
  </head>

  <body ng-controller="myCtrl" class="container mt-4" ng-app="myApp">
    <h2 class="mb-3">Add New User</h2>
    <form
      name="userForm"
      ng-submit="addUser()"
      class="card p-3 mb-4 shadow-sm"
      novalidate
    >
      <div class="row">
        <div class="col-md-4 mb-3">
          <label>First Name</label>
          <input
            type="text"
            class="form-control"
            name="firstName"
            ng-model="newUser.firstName"
            ng-pattern="/^[a-zA-Z]+$/"
            ng-minlength="2"
            ng-maxlength="20"
            required
          />
          <div
            class="error"
            ng-if="userForm.firstName.$touched && userForm.firstName.$invalid"
          >
            <div ng-if="userForm.firstName.$error.required">Required.</div>
            <div ng-if="userForm.firstName.$error.pattern">Letters only.</div>
            <div ng-if="userForm.firstName.$error.minlength">Min 2 chars.</div>
            <div ng-if="userForm.firstName.$error.maxlength">Max 20 chars.</div>
          </div>
        </div>

        <div class="col-md-4 mb-3">
          <label>Last Name</label>
          <input
            type="text"
            class="form-control"
            name="lastName"
            ng-model="newUser.lastName"
            ng-pattern="/^[a-zA-Z]+$/"
            ng-minlength="2"
            ng-maxlength="20"
            required
          />
          <div
            class="error"
            ng-if="userForm.lastName.$touched && userForm.lastName.$invalid"
          >
            <div ng-if="userForm.lastName.$error.required">Required.</div>
            <div ng-if="userForm.lastName.$error.pattern">Letters only.</div>
            <div ng-if="userForm.lastName.$error.minlength">Min 2 chars.</div>
            <div ng-if="userForm.lastName.$error.maxlength">Max 20 chars.</div>
          </div>
        </div>

        <div class="col-md-4 mb-3">
          <label>Age</label>
          <input
            type="number"
            class="form-control"
            name="age"
            ng-model="newUser.age"
            min="1"
            max="120"
            required
          />
          <div
            class="error"
            ng-if="userForm.age.$touched && userForm.age.$invalid"
          >
            <div ng-if="userForm.age.$error.required">Required.</div>
            <div ng-if="userForm.age.$error.min || userForm.age.$error.max">
              1-120 only.
            </div>
          </div>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        ng-disabled="userForm.$invalid"
      >
        Add User
      </button>
    </form>

    <div class="alert alert-success" ng-if="successMessage">
      {{ successMessage }}
    </div>

    <h2 class="mb-3">Users List</h2>
    <table class="table table-striped table-bordered">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>ID</th>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr ng-if="users.length === 0">
          <td colspan="5" class="text-center">No users found.</td>
        </tr>
        <tr ng-repeat="user in users">
          <td>{{$index + 1}}</td>
          <td>{{user.id}}</td>
          <td>{{user.firstName}}</td>
          <td>{{user.lastName}}</td>
          <td>
            <button
              class="btn btn-danger btn-sm"
              ng-click="deleteUser(user.id)"
            >
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <script>
      const app = angular.module("myApp", []);
      app.controller("myCtrl", function ($scope, userService) {
        $scope.users = [];
        $scope.newUser = {};
        $scope.successMessage = "";

        // Fetch users
        userService
          .get("https://dummyjson.com/users")
          .then((res) => ($scope.users = res.data.users))
          .catch((err) => console.error("Error fetching users:", err));

        // Add new user
        $scope.addUser = function () {
          if ($scope.userForm.$valid) {
            userService
              .post("https://dummyjson.com/users/add", $scope.newUser)
              .then((res) => {
                $scope.users.push(res.data);
                $scope.successMessage = "User added successfully!";
                $scope.newUser = {};
                $scope.userForm.$setPristine();
                $scope.userForm.$setUntouched();
              })
              .catch((err) => console.error("Error adding user:", err));
          }
        };

        // Delete user
        $scope.deleteUser = function (id) {
          userService
            .delete(`https://dummyjson.com/users/${id}`)
            .then(
              () => ($scope.users = $scope.users.filter((u) => u.id !== id)),
            )
            .catch((err) => console.error("Error deleting user:", err));
        };
      });

      app.service("userService", function ($http) {
        this.getUsers = function () {
          return $http.get("https://dummyjson.com/users");
        };

        this.addUser = function (user) {
          return $http.post("https://dummyjson.com/users/add", user);
        };

        this.deleteUser = function (id) {
          return $http.delete(`https://dummyjson.com/users/${id}`);
        };
      });
    </script>
  </body>
</html>
