<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Products</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

    <style>
      body {
        background: linear-gradient(to right, #4e73df, #1cc88a);
        min-height: 100vh;
        padding: 40px 0;
      }

      h2 {
        color: white;
        font-weight: 700;
        text-transform: uppercase;
      }

      .custom-card {
        border: none;
        border-radius: 15px;
        overflow: hidden;
        transition: all 0.3s ease;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      .custom-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      }

      .custom-card img {
        height: 200px;
        object-fit: cover;
      }

      .btn-custom {
        background-color: #4e73df;
        border: none;
      }

      .btn-custom:hover {
        background-color: #2e59d9;
      }
    </style>
  </head>

  <body ng-app="myApp" ng-controller="myCtrl">
    <counter count="counter"></counter>
    <div class="container">
      <h2 class="text-center mb-5">Our Products</h2>

      <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" ng-repeat="product in products">
          <card title="product.title" price="product.price"></card>
        </div>
      </div>
    </div>

    <script>
      var app = angular.module("myApp", []);

      app.controller("myCtrl", function ($scope) {
        $scope.products = [
          {
            title: "Laptop",
            price: 1200,
          },
          {
            title: "Smartphone",
            price: 200,
          },
          {
            title: "Headphones",
            price: 800,
          },
        ];
      });

      app.directive("card", function () {
        return {
          scope: {
            title: "=",
            price: "=",
          },
          template: `
            <div class="card custom-card h-100">
              <img ng-src="{{image}}" class="card-img-top" alt="{{title}}">
              <div class="card-body d-flex flex-column">
                <h5 class="card-title fw-bold">{{title}}</h5>
                <p class="card-text text-muted">{{price}}</p>
                <a href="#" class="btn btn-custom mt-auto text-white">View Details</a>
              </div>
            </div>
          `,
        };
      });
      app.directive("counter", function () {
        return {
          scope: {
            count: "=",
          },
          template: `<button class="btn btn-primary" ng-click="counter = counter + 1">increment</button>
          <p>Counter Value: {{counter}}</p>
          <button class="btn btn-danger" ng-click="counter = counter - 1">Decrement</button>`,
          link: function (scope) {
            scope.counter = 0;
            scope.increment = function () {
              scope.counter++;
            };
            scope.decrement = function () {
              scope.counter--;
            };
          },
        };
      });
    </script>
  </body>
</html>
