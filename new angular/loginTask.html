<!DOCTYPE html>
<html lang="en" ng-app="loginApp">
<head>
  <meta charset="UTF-8" />
  <title>Login Form</title>

  <!-- Bootstrap -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <!-- AngularJS -->
   <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

  <style>
    body {
      background: linear-gradient(to right, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      width: 400px;
      padding: 30px;
      border-radius: 15px;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body ng-controller="loginCtrl">

  <div class="login-card">
    <h3 class="text-center mb-4">Login</h3>

    <form name="loginForm" novalidate>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email"
               name="email"
               class="form-control"
               ng-model="user.email"
               required>

        <small class="text-danger"
               ng-show="loginForm.email.$touched && loginForm.email.$error.required">
          Email is required
        </small>

        <small class="text-danger"
               ng-show="loginForm.email.$touched && loginForm.email.$error.email">
          Please enter a valid email
        </small>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password"
               name="password"
               class="form-control"
               ng-model="user.password"
               required
               ng-minlength="6">

        <small class="text-danger"
               ng-show="loginForm.password.$touched && loginForm.password.$error.required">
          Password is required
        </small>

        <small class="text-danger"
               ng-show="loginForm.password.$touched && loginForm.password.$error.minlength">
          Password must be at least 6 characters
        </small>
      </div>

      <!-- Login Button -->
      <button type="button"
              class="btn btn-primary w-100"
              ng-click="login()"
              ng-disabled="loginForm.$invalid">
        Login
      </button>
    </form>
    <!-- Display Section -->
    <div class="mt-4 text-center" ng-if="loginMessage">
      <h5 ng-class="{'text-success': isSuccess, 'text-danger': !isSuccess}">
        {{loginMessage}}
      </h5>
    </div>
  </div>
  <script>
    angular.module("loginApp", [])
      .controller("loginCtrl", function ($scope) {
        const validEmail = "admin@gmail.com";
        const validPassword = "123456";
        $scope.login = function () {
          if ($scope.user.email === validEmail && $scope.user.password === validPassword) {
            $scope.isSuccess = true;
            $scope.loginMessage = "Login Successful";
          } else {
            $scope.isSuccess = false;
            $scope.loginMessage = "Login Not Successful";
          }
        };

      });
  </script>

</body>
</html>
