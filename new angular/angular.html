<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>angular js</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .login-box {
        background: white;
        padding: 30px;
        width: 320px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .login-box h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      .input-group {
        margin-bottom: 15px;
      }

      .input-group label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
      }

      .input-group input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background-color: #45a049;
      }
    </style>
  </head>
  <body>
    <div ng-app="myApp">
      <div
        class="container d-flex justify-content-center align-items-center vh-100"
      >
        <div
          class="card shadow p-4"
          style="width: 400px"
          ng-controller="myCtrl"
        >
          <h3 class="text-center mb-4">Student Login</h3>
          <form name="loginForm" ng-submit="login()" novalidate>
            <!-- Student Name -->
            <div class="mb-3">
              <label class="form-label">Student Name</label>
              <input
                type="text"
                name="studentName"
                class="form-control"
                ng-model="studentName"
                required
                ng-class="{'is-invalid': loginForm.studentName.$touched && loginForm.studentName.$invalid}"
              />

              <!-- Validation message -->
              <div
                class="invalid-feedback"
                ng-show="loginForm.$submitted && loginForm.studentName.$invalid"
              >
                Student Name is required.
              </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input
                type="password"
                name="password"
                class="form-control"
                ng-model="password"
                required
                ng-minlength="4"
                ng-class="{'is-invalid': loginForm.password.$touched && loginForm.password.$invalid}"
              />

              <div
                class="invalid-feedback"
                ng-show="loginForm.$submitted && loginForm.studentName.$invalid"
              >
                Password is required.
              </div>

              <div
                class="invalid-feedback"
                ng-show="loginForm.password.$error.minlength"
              >
                Password must be at least 4 characters.
              </div>
            </div>

            <!-- Login Button -->
            <button
              type="submit"
              class="btn btn-success w-100"
              ng-click="login()"
              ng-disabled="loginForm.$invalid"
            >
              Login
            </button>
          </form>

          <!-- Display Section -->
          <div class="mt-4 text-center">
            <h5 ng-if="outputName">Welcome, {{outputName}}</h5>
          </div>
        </div>
      </div>
    </div>

    <script>
      var app = angular.module("myApp", []);

      app.controller("myCtrl", function ($scope) {
        $scope.login = function () {
          $scope.outputName = $scope.studentName;
        };
      });
    </script>
  </body>
</html>
